apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  labels:
    app: ticket-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      containers:
      - name: ticket-service
        image: 137008403814.dkr.ecr.us-east-1.amazonaws.com/ai-itsm-ticket-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          value: "sqlite:///./tickets.db"
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-service
spec:
  selector:
    app: ticket-service
  ports:
  - port: 8001
    targetPort: 8001
  type: LoadBalancer